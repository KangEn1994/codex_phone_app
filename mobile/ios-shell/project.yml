name: CodexApp
options:
  bundleIdPrefix: com.codexapp
targets:
  CodexApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: CodexApp
    resources:
      - path: CodexApp/Resources
      - path: CodexApp/Info.plist
        buildPhase: none
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.codexapp.mobile
        PRODUCT_NAME: CodexApp
        INFOPLIST_FILE: CodexApp/Info.plist
        SWIFT_VERSION: 5.0
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
