name: Android Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/mobile-packages.yml"
      - "mobile/**"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-packages.yml"
      - "mobile/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile/android-shell
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare Android signing keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
          echo "ANDROID_KEYSTORE_PATH=$PWD/release.keystore" >> "$GITHUB_ENV"

      - name: Build Android debug APK
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Build Android release APK and AAB
        run: ./gradlew --no-daemon :app:assembleRelease :app:bundleRelease

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: mobile/android-shell/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            mobile/android-shell/app/build/outputs/apk/release/*.apk
            mobile/android-shell/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
          retention-days: 14

      - name: Send Feishu card notification
        if: ${{ always() && github.event_name != 'pull_request' && env.FEISHU_WEBHOOK_URL != '' }}
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          python3 - <<'PY' > feishu-payload.json
          import base64
          import hashlib
          import hmac
          import json
          import os
          import time

          status = os.environ["JOB_STATUS"].lower()
          status_text = {
              "success": "成功",
              "failure": "失败",
              "cancelled": "已取消",
          }.get(status, status)
          template = {
              "success": "green",
              "failure": "red",
              "cancelled": "grey",
          }.get(status, "blue")

          repo = os.environ["GITHUB_REPOSITORY"]
          ref_name = os.environ["GITHUB_REF_NAME"]
          actor = os.environ["GITHUB_ACTOR"]
          sha = os.environ["GITHUB_SHA"]
          run_id = os.environ["GITHUB_RUN_ID"]
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          event_name = os.environ["GITHUB_EVENT_NAME"]
          server_url = os.environ["GITHUB_SERVER_URL"]

          run_url = f"{server_url}/{repo}/actions/runs/{run_id}"
          commit_url = f"{server_url}/{repo}/commit/{sha}"

          payload = {
              "msg_type": "interactive",
              "card": {
                  "config": {
                      "wide_screen_mode": True,
                      "enable_forward": True,
                  },
                  "header": {
                      "template": template,
                      "title": {
                          "tag": "plain_text",
                          "content": f"Android 打包完成: {status_text}",
                      },
                  },
                  "elements": [
                      {
                          "tag": "div",
                          "fields": [
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**仓库**\n{repo}",
                                  },
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**分支/标签**\n{ref_name}",
                                  },
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**触发人**\n{actor}",
                                  },
                              },
                              {
                                  "is_short": True,
                                  "text": {
                                      "tag": "lark_md",
                                      "content": f"**触发方式**\n{event_name}",
                                  },
                              },
                          ],
                      },
                      {
                          "tag": "div",
                          "text": {
                              "tag": "lark_md",
                              "content": (
                                  f"**运行号**\n#{run_number}\n\n"
                                  f"**提交**\n`{sha[:7]}`\n\n"
                                  "**产物**\n"
                                  "`android-debug-apk`、`android-release-artifacts`"
                              ),
                          },
                      },
                      {
                          "tag": "action",
                          "actions": [
                              {
                                  "tag": "button",
                                  "type": "primary",
                                  "text": {
                                      "tag": "plain_text",
                                      "content": "查看构建",
                                  },
                                  "url": run_url,
                              },
                              {
                                  "tag": "button",
                                  "text": {
                                      "tag": "plain_text",
                                      "content": "查看提交",
                                  },
                                  "url": commit_url,
                              },
                          ],
                      },
                  ],
              },
          }

          secret = os.environ.get("FEISHU_WEBHOOK_SECRET", "").strip()
          if secret:
              timestamp = str(int(time.time()))
              string_to_sign = f"{timestamp}\n{secret}"
              sign = base64.b64encode(
                  hmac.new(
                      string_to_sign.encode("utf-8"),
                      digestmod=hashlib.sha256,
                  ).digest()
              ).decode("utf-8")
              payload["timestamp"] = timestamp
              payload["sign"] = sign

          print(json.dumps(payload, ensure_ascii=False))
          PY

          curl --fail --show-error --silent \
            -H "Content-Type: application/json" \
            -X POST \
            "$FEISHU_WEBHOOK_URL" \
            --data @feishu-payload.json
